<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Blackjack Copilot</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="home-body">
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="navbar-brand">Blackjack Copilot</a>
            <div class="navbar-links">
                <a href="/rules">Rules</a>
                <a href="/hilo">Hi-Lo</a>
                <a href="/login">Login</a>
                <a href="/register" class="nav-active">Register</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="hero-card-deco">
                    <span class="deco-suit s1">&spades;</span>
                    <span class="deco-suit s2">&hearts;</span>
                    <span class="deco-suit s3">&diams;</span>
                    <span class="deco-suit s4">&clubs;</span>
                </div>
                <h1>Create Account</h1>
                <p class="auth-subtitle">Join and start playing with AI guidance</p>
            </div>

            <div id="error-msg" class="auth-error hidden"></div>

            <div class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Choose a username (3+ chars)" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Choose a password (4+ chars)" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm your password" autocomplete="new-password">
                </div>
                <button class="start-btn" onclick="doRegister()">
                    <span class="start-btn-text">Create Account</span>
                    <span class="start-btn-arrow">&rarr;</span>
                </button>
            </div>

            <div class="auth-footer">
                <p>Already have an account? <a href="/login" class="auth-link">Sign in here</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('confirm-password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doRegister();
        });

        async function doRegister() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const errorEl = document.getElementById('error-msg');
            errorEl.classList.add('hidden');

            if (!username || !password || !confirm) {
                errorEl.textContent = 'Please fill in all fields';
                errorEl.classList.remove('hidden');
                return;
            }

            if (password !== confirm) {
                errorEl.textContent = 'Passwords do not match';
                errorEl.classList.remove('hidden');
                return;
            }

            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, confirm_password: confirm })
            });
            const data = await res.json();

            if (data.success) {
                window.location.href = '/dashboard';
            } else {
                errorEl.textContent = data.error || 'Registration failed';
                errorEl.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
