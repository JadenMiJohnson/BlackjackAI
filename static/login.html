<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agent B21</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="home-body">
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="navbar-brand">Agent B21</a>
            <div class="navbar-links">
                <a href="/rules">Rules</a>
                <a href="/hilo">Hi-Lo</a>
                <a href="/login" class="nav-active">Login</a>
                <a href="/register">Register</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="hero-card-deco">
                    <span class="deco-suit s1">&spades;</span>
                    <span class="deco-suit s2">&hearts;</span>
                    <span class="deco-suit s3">&diams;</span>
                    <span class="deco-suit s4">&clubs;</span>
                </div>
                <h1>Welcome Back</h1>
                <p class="auth-subtitle">Sign in to play Agent B21</p>
            </div>

            <div id="error-msg" class="auth-error hidden"></div>

            <div class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                </div>
                <button class="start-btn" onclick="doLogin()">
                    <span class="start-btn-text">Sign In</span>
                    <span class="start-btn-arrow">&rarr;</span>
                </button>
            </div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="/register" class="auth-link">Register here</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doLogin();
        });
        document.getElementById('username').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });

        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');
            errorEl.classList.add('hidden');

            if (!username || !password) {
                errorEl.textContent = 'Please fill in all fields';
                errorEl.classList.remove('hidden');
                return;
            }

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                window.location.href = '/dashboard';
            } else {
                errorEl.textContent = data.error || 'Login failed';
                errorEl.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
